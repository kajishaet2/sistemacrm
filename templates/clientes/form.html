{% extends 'base.html' %}
{% block title %}{{ accion }} | Grafimaster CRM{% endblock %}
{% block content %}
<div class="card card-soft p-4">
    <h3 class="fw-bold mb-3">{{ accion }}</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Guardar</button>
        <a href="{% url 'clientes' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
