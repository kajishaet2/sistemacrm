<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión | {{ empresa_config.nombre_empresa }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #081224 0%, #1d4ed8 100%); color: white; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; }
        .hero-title { font-size: 2.4rem; font-weight: 700; }
        .hero-text { font-size: 1.05rem; color: rgba(255,255,255,0.86); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row align-items-center min-vh-100">
            <div class="col-lg-7 mb-4 mb-lg-0">
                <div class="p-4 p-lg-5 glass">
                    <div class="mb-3"><span class="badge bg-light text-primary">CRM moderno</span></div>
                    <h1 class="hero-title">{{ empresa_config.nombre_empresa }}</h1>
                    <p class="hero-text mt-3">{{ empresa_config.descripcion_sistema }}</p>
                    <p class="hero-text">{{ empresa_config.slogan }}</p>
                    <ul class="mt-4">
                        <li>Centraliza clientes y órdenes</li>
                        <li>Gestiona conversaciones por WhatsApp</li>
                        <li>Controla pagos y entregas con claridad</li>
                    </ul>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="p-4 p-lg-5 glass">
                    <h3 class="fw-bold mb-3">Acceso al sistema</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button class="btn btn-light text-primary w-100">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
